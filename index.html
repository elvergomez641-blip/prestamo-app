<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CobroPago</title>

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#2b0fbf,#0a0a2a);
    color:white;
}

/* ===== HEADER ===== */
.header{
    padding:20px;
    font-size:26px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
}

/* ===== ALERTA ===== */
.alerta{
    background:#0b0b1f;
    margin:15px;
    padding:15px;
    border-radius:20px;
    font-size:14px;
    color:#cfcfcf;
    animation:fadeIn 1s;
}

/* ===== CARD ===== */
.card{
    background:#050517;
    margin:15px;
    padding:20px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    animation:fadeUp 1s;
}

.titulo{
    color:#a855f7;
    font-size:22px;
    margin-bottom:20px;
}

.grid{
    display:flex;
    justify-content:space-between;
}

/* INFO */
.label{
    color:#888;
    font-size:13px;
}

.valor{
    color:#a855f7;
    font-weight:bold;
}

/* ===== QR PRO ===== */
.qr{
    text-align:center;
}

.qr img{
    width:150px;
    border-radius:10px;
    background:white;
    padding:5px;
    animation:pulse 2s infinite;
}

.monto{
    background:#6d28d9;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    font-weight:bold;
}

/* ===== TIMER ===== */
.timer-card{
    background:#050517;
    margin:15px;
    padding:20px;
    border-radius:25px;
    text-align:center;
}

.timer{
    font-size:28px;
    color:#a855f7;
    font-weight:bold;
}

/* ===== BOTON PRO ===== */
.boton{
    position:fixed;
    bottom:70px;
    left:15px;
    right:15px;
    background: linear-gradient(90deg,#7c3aed,#9333ea);
    text-align:center;
    padding:18px;
    border-radius:35px;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 5px 20px rgba(168,85,247,0.5);
    transition:0.2s;
}

.boton:active{
    transform:scale(0.95);
}

/* ===== MENU ===== */
.menu{
    position:fixed;
    bottom:0;
    width:100%;
    background:#0b0b1f;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}

/* ===== ANIMACIONES ===== */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.expirado{
    color:red;
}

</style>
</head>

<body>

<div class="header">
    PrestaFin
</div>

<div class="alerta">
    🛡️ Verifica los datos antes de pagar.
</div>

<div class="card">

    <div class="titulo">Información del pago</div>

    <div class="grid">

        <div>
            <p class="label">Deudor</p>
            <p class="valor">Damian Ezequiel Lacamoyra</p>

            <p class="label">Teléfono</p>
            <p class="valor">3544549670</p>

            <p class="label">C.I.</p>
            <p class="valor">35940937</p>
               <p class="label">Correo</p>
            <p class="valor">lacamoyradamian@gmail.com</p>
            
            <!--

     
              
            
              -->
        </div>

        <div class="qr">
            <p>Escaneá</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PAGO-27000">
            <div class="monto">$54.000.00</div>
        </div>

    </div>

</div>

<div class="timer-card">
    <p>Expira en:</p>
    <div class="timer" id="contador">15:00</div>
</div>

<div class="boton" onclick="pagar()">
    Pagar ahora
</div>

<div class="menu">
    <div>🏠</div>
    <div>👤</div>
</div>

<script>

let tiempo = 900;

let intervalo = setInterval(() => {
    let min = Math.floor(tiempo / 60);
    let seg = tiempo % 60;

    document.getElementById("contador").innerText =
        `${min}:${seg < 10 ? '0'+seg : seg}`;

    if(tiempo <= 0){
        clearInterval(intervalo);
        document.getElementById("contador").innerText = "EXPIRADO";
        document.getElementById("contador").classList.add("expirado");
    }

    tiempo--;

}, 1000);

function pagar(){
    if(navigator.vibrate){
        navigator.vibrate(200);
    }

    alert("Redirigiendo al pago...");
}

</script>

</body>
</html>
