<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiroCredito</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f4f8;
    padding-bottom:80px;
}

/* HEADER */
.header{
    background:#d4a017;
    color:white;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.titulo{
    color:#2a9d8f;
    font-size:20px;
}

.flex{
    display:flex;
    justify-content:space-between;
}

.monto{
    font-size:30px;
    font-weight:bold;
}

/* CUOTAS */
.cuota{
    background:white;
    margin:15px 20px;
    padding:15px;
    border-radius:15px;
}

.rojo{ color:red; font-weight:bold; }

.verde{
    background:#2ec4b6;
    color:white;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

/* BOTÓN */
.boton-pagar{
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 400px;
    background: linear-gradient(90deg, #d4a017, #f1c232);
    color: white;
    text-align: center;
    padding: 15px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

/* PANTALLA MANTENIMIENTO */
.mantenimiento{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#f2f4f8;
    justify-content:center;
    align-items:center;
}

.card-mant{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<!-- CONTENIDO PRINCIPAL -->
<div id="app">

<div class="header">
    <h2>HiroCredito</h2>
    <p>+54 298****448</p>
</div>

<div class="card">
    <div class="titulo">Devolución pendiente</div>

    <div class="flex">
        <div>
            <div class="monto">$82.350</div>
            <div>Monto del préstamo</div>
        </div>

        <div>
            <div>02-04-2026</div>
            <div>Fecha del préstamo</div>
        </div>
    </div>
</div>

<div class="cuota">
    <div class="verde">1/2</div>
    <p>Hoy vence la <span class="rojo">1ra cuota</span></p>
    <p>Fecha: <span class="rojo">09-04-2026</span></p>
</div>

<div class="cuota">
    <div class="verde">2/2</div>
    <p>Faltan <span class="rojo">8 días</span></p>
</div>

</div>

<!-- BOTÓN -->
<div class="boton-pagar" onclick="mostrarMantenimiento()">
    💳 Pagar ahora
</div>

<!-- PANTALLA DE MANTENIMIENTO -->
<div class="mantenimiento" id="mant">
    <div class="card-mant">
        <h2 style="color:#d4a017;">⚙️ App en mantenimiento</h2>
        <p>Estamos mejorando nuestros servicios</p>
        <p>Intenta nuevamente más tarde</p>
    </div>
</div>

<script>
function mostrarMantenimiento(){
    document.getElementById("app").style.display = "none";
    document.getElementById("mant").style.display = "flex";
}
</script>

</body>
</html>
